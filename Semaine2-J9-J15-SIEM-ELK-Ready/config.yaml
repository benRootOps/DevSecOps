SEUIL: 5

THRESHOLD: 5

# J12 RULESET: Liste de regex pour Failed SSH. Le 1er qui match gagne.
FAIL_PATTERNS:
  - 'Failed password for (?:invalid user )?(\S+) from (\d+\.\d+\.\d+\.\d+)'
  - 'Failed password for root from (\d+\.\d+\.\d+\.\d+)'
  - 'PAM.* authentication failure.*rhost=(\d+\.\d+\.\d+\.\d+)' # Pour ton cas PAM

LOG_FILE: "/var/log/auth.log"

log_level: "DEBUG"

COMMENT_TAG: "J9-J15"

ACTION: "alert"

WINDOW_SEC: 300

OUTPUT_JSON: "alerts.jsonl"

BAN_DURATION: 600

WHITELIST:
  - "127.0.0.1"
  - "10.180.66.239"
  #votre ip vous la configurer ici ou celon vos préferences
