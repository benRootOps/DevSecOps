SEUIL: 5

# J12 RULESET: Liste de regex pour Failed SSH. Le 1er qui match gagne.
FAIL_PATTERNS:
  - 'Failed password for (?:invalid user )?(\S+) from (\d+\.\d+\.\d+\.\d+)'
  - 'Failed password for root from (\d+\.\d+\.\d+\.\d+)'
  - 'PAM.* authentication failure.*rhost=(\d+\.\d+\.\d+\.\d+)' # Pour ton cas PAM

LOG_FILE: "/var/log/auth.log"

log_level: "DEBUG"

COMMENT_TAG: "J9-J15"

ACTION: "block"

WINDOW_SEC: 300

OUTPUT_JSON: "/opt/siem/var/alerts.jsonl"

BAN_DURATION_SEC: 1800 # durée du ban avant unban auto
UNBAN_CHECK_INTERVAL_SEC: 30 # fréquence de vérification (thread de fond)
RATE_LIMIT_MAX_ACTIONS: 10 # nb max d'actions ban/unban...
RATE_LIMIT_WINDOW_SEC: 60 # ...par fenêtre de X secondes
BAN_STATE_FILE: /opt/siem/var/banned_ips.jsonl
RESET_BAN_ON_REPEAT: true # prolonge le ban si l'IP retente pendant qu'elle est bannie

WHITELIST:
  - "127.0.0.1"
  #- "10.180.66.239"
  #votre ip vous la configurer ici ou celon vos préferences
